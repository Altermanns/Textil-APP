{% extends 'paginas/base.html' %}
{% load static %}

{% block titulo %} Login {% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="card shadow border-0 p-4" style="max-width:450px; width:100%; border-radius: 15px;">
    <div class="text-center mb-4">
      <div class="mb-3">
        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
      </div>
      <h3 class="fw-bold">Acceso Seguro</h3>
      <p class="text-muted">Inicia sesión a través de Keycloak</p>
    </div>
    
    <div class="mt-2">
      <a href="{% url 'keycloak_login' %}" class="btn btn-primary btn-lg w-100 py-3 shadow-sm d-flex align-items-center justify-content-center border-0" style="background-color: #0d6efd !important; color: white !important; font-weight: 600; letter-spacing: 0.5px;">
        <i class="bi bi-box-arrow-in-right me-2" style="font-size: 1.4rem; color: white !important;"></i>
        <span style="color: white !important;">ENTRAR CON KEYCLOAK</span>
      </a>
    </div>
    
    <div class="mt-4 text-center">
      <hr class="text-muted opacity-25">
      <a href="{% url 'inicio' %}" class="btn btn-link text-decoration-none text-muted">
        <i class="bi bi-arrow-left me-1"></i> Volver al inicio
      </a>
    </div>
  </div>
</div>

{% endblock %}
